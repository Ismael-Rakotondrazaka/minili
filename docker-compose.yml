services:
  app:
    build: .
    container_name: minili
    restart: always
    image: minili:2.0.0
    environment:
      - PORT=3000
      - APP_URL=${APP_URL}
      - MONGO_URI=${MONGO_URI}
      - REDIS_URL=${REDIS_URL}

    networks:
      - web
      - backend-network

    labels:
      - "traefik.enable=true"

      # Router (HTTP)
      - "traefik.http.routers.url.rule=Host(`minili.ismaelrakoto.com`)"
      - "traefik.http.routers.url.entrypoints=web"

      # Service port inside container
      - "traefik.http.services.url.loadbalancer.server.port=3000"

networks:
  web:
    external: true
  backend-network:
    external: true
