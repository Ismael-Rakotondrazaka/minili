<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>minili — URL Shortener</title>
    <meta name="description" content="A minimal, fast URL shortener with a clean and simple interface. Open source and easy to self-host." />

    <!-- Open Graph -->
    <meta property="og:title" content="minili — URL Shortener" />
    <meta property="og:description" content="A minimal, fast URL shortener with a clean and simple interface. Open source and easy to self-host." />
    <meta property="og:image" content="./public/minili-card.png" />
    <meta property="og:type" content="website" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="minili — URL Shortener" />
    <meta name="twitter:description" content="A minimal, fast URL shortener with a clean and simple interface. Open source and easy to self-host." />
    <meta name="twitter:image" content="./public/minili-card.png" />
    <style>
      :root {
        --dark-blue: #001f3f;
        --bright-blue: #00b4ff;
        --text-gray: #4a5568;
        --bg-white: #ffffff;
      }

      body {
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        background-color: #f0f2f5;
      }

      .project-card {
        background: var(--bg-white);
        width: 900px;
        height: 400px;
        display: flex;
        align-items: center;
        padding: 0 30px;
        box-sizing: border-box;
        position: relative;
        overflow: hidden;
      }

      .project-card__content {
        flex: 1;
        z-index: 2;
      }

      .project-card__tagline {
        color: var(--bright-blue);
        font-weight: 800;
        text-transform: uppercase;
        font-size: 1.1rem;
        margin-bottom: 8px;
        letter-spacing: 0.5px;
      }

      .project-card__title {
        color: var(--dark-blue);
        font-size: 2.8rem;
        font-weight: 700;
        line-height: 1.1;
        margin: 0 0 16px 0;
      }

      .project-card__description {
        color: var(--text-gray);
        font-size: 1rem;
        margin: 0 0 24px 0;
        max-width: 380px;
        line-height: 1.5;
      }

      .project-card__stack {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .project-card__badge {
        background: var(--dark-blue);
        color: var(--bg-white);
        font-size: 0.75rem;
        font-weight: 600;
        padding: 4px 10px;
        border-radius: 4px;
        letter-spacing: 0.3px;
      }

      .project-card__logo-wrapper {
        width: 320px;
        height: 320px;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .project-card__logo {
        width: 55%;
        height: auto;
      }
    </style>
  </head>
  <body>
    <div class="project-card">
      <div class="project-card__content">
        <div class="project-card__tagline">URL Shortener</div>
        <h1 class="project-card__title">minili</h1>
        <p class="project-card__description">
          A minimal, fast URL shortener with a clean and simple interface.
        </p>
        <div class="project-card__stack">
          <span class="project-card__badge">Short Links</span>
          <span class="project-card__badge">Fast</span>
          <span class="project-card__badge">Open Source</span>
        </div>
      </div>

      <div class="project-card__logo-wrapper">
        <img
          src="./public/images/logo-minili.svg"
          alt="minili logo"
          class="project-card__logo"
        />
      </div>
    </div>
  </body>
</html>
